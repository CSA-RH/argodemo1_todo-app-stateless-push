---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: todo-app
  namespace: openshift-gitops
spec:
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: todo-app-placement
        requeueAfterSeconds: 100
  template:
    metadata:
      name: todo-app-{{name}}
    spec:
      project: default
      source:
        repoURL: https://github.com/CSA-RH/argodemo1_todo-app-stateless-push.git
        targetRevision: main
        path: kustomize/overlays/prod
      destination:
        server: "{{server}}"
        namespace: todo-app
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true


# Key fields:
# 
# | Field | Purpose |
# |---|---|
# | `configMapRef: acm-placement` | Points to the ConfigMap that tells ArgoCD how to read `PlacementDecision` resources. |
# | `labelSelector` | Selects PlacementDecision resources generated by the `todo-app-placement` Placement. |
# | `requeueAfterSeconds: 100` | How often the generator re-reads PlacementDecision to detect cluster changes. |
# | `{{name}}` | Cluster name from the ArgoCD cluster secret (e.g. `cluster1`). |
# | `{{server}}` | Cluster API server URL from the ArgoCD cluster secret. |
# | `source` | Must use singular `source` (not `sources` array) for ACM Search API compatibility. |

# > **Important:** Use `source` (singular), not `sources` (plural array). The ACM
# > Search indexer only reads the singular `source` field. With `sources`, the
# > `path`, `repoURL`, and `targetRevision` fields will be empty in the search
# > index, causing the ACM console to show "missing" status.

