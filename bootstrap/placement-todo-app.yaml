---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: todo-app-placement
  namespace: openshift-gitops
spec:
  numberOfClusters: 1
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: environment
              operator: In
              values:
                - prod
